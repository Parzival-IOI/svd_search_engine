services:
  svd-search:
    build:
      context: .
      dockerfile: Dockerfile
    image: svd-search-engine:latest
    container_name: svd_search_app
    restart: unless-stopped
    ports:
      - "8501:8501"

    # Mount model artifacts and data from the host so the container can read
    # pre-built joblib files without baking large binaries into the image.
    # Run `docker compose up` with the models/ and data/ already populated on
    # your host, or populate them via a separate preprocessing step.
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro        # read-only — container never writes data

    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
